name: Vendor tap qualification

on:
  workflow_dispatch:
    inputs:
      stage:
        description: Prepare before reboot, resume after reboot, or clean a failed run
        required: true
        type: choice
        options:
          - prepare
          - resume
          - cleanup
      baseline_release_commit:
        description: Exact reviewed main ancestor for v0.0.2-dev.11
        required: true
        type: string
      candidate_release_commit:
        description: Exact reviewed main ancestor for v0.0.2-dev.12
        required: true
        type: string
      baseline_tap_commit:
        description: Exact reviewed tap commit containing the dev.11 formula
        required: true
        type: string
      candidate_tap_commit:
        description: Exact reviewed tap commit containing the dev.12 formula
        required: true
        type: string

permissions: {}

concurrency:
  group: phase-02-vendor-tap-qualification
  cancel-in-progress: false

jobs:
  validate:
    name: Validate immutable inputs
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      HOSTWRIGHT_BASELINE_RELEASE_COMMIT: ${{ inputs.baseline_release_commit }}
      HOSTWRIGHT_CANDIDATE_RELEASE_COMMIT: ${{ inputs.candidate_release_commit }}
      HOSTWRIGHT_BASELINE_TAP_COMMIT: ${{ inputs.baseline_tap_commit }}
      HOSTWRIGHT_CANDIDATE_TAP_COMMIT: ${{ inputs.candidate_tap_commit }}
    steps:
      - name: Check out the exact candidate commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.candidate_release_commit }}
          fetch-depth: 0
          persist-credentials: false

      - name: Require reviewed main ancestors and exact pair contract
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_REPOSITORY" = hostwright/hostwright
          test "$(git rev-parse HEAD)" = "$HOSTWRIGHT_CANDIDATE_RELEASE_COMMIT"
          git fetch --no-tags origin main
          git merge-base --is-ancestor "$HOSTWRIGHT_BASELINE_RELEASE_COMMIT" "$HOSTWRIGHT_CANDIDATE_RELEASE_COMMIT"
          git merge-base --is-ancestor "$HOSTWRIGHT_CANDIDATE_RELEASE_COMMIT" origin/main
          scripts/release/qualify-vendor-tap.sh validate-contract

  qualify:
    name: ${{ inputs.stage }} on clean macOS 26 cell
    needs: validate
    runs-on: [self-hosted, macOS, ARM64, hostwright-clean-install]
    environment: release
    timeout-minutes: 90
    permissions:
      contents: read
      attestations: read
    env:
      GH_TOKEN: ${{ github.token }}
      HOSTWRIGHT_BASELINE_RELEASE_COMMIT: ${{ inputs.baseline_release_commit }}
      HOSTWRIGHT_CANDIDATE_RELEASE_COMMIT: ${{ inputs.candidate_release_commit }}
      HOSTWRIGHT_BASELINE_TAP_COMMIT: ${{ inputs.baseline_tap_commit }}
      HOSTWRIGHT_CANDIDATE_TAP_COMMIT: ${{ inputs.candidate_tap_commit }}
      RELEASE_TEAM_ID: ${{ vars.RELEASE_TEAM_ID }}
    steps:
      - name: Check out reviewed qualification code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.candidate_release_commit }}
          fetch-depth: 0
          persist-credentials: false

      - name: Run the selected qualification stage
        shell: bash
        env:
          QUALIFICATION_STAGE: ${{ inputs.stage }}
        run: |
          set -euo pipefail
          export HOSTWRIGHT_QUALIFICATION_ROOT="$HOME/.hostwright-phase02-vendor-tap"
          if [[ "$QUALIFICATION_STAGE" == prepare ]]; then
            test ! -e "$HOSTWRIGHT_QUALIFICATION_ROOT"
            install -d -m 700 "$HOSTWRIGHT_QUALIFICATION_ROOT"
          else
            test -d "$HOSTWRIGHT_QUALIFICATION_ROOT"
          fi
          scripts/release/qualify-vendor-tap.sh "$QUALIFICATION_STAGE"

      - name: Retain bounded qualification evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vendor-tap-${{ inputs.stage }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ~/.hostwright-phase02-vendor-tap/evidence.log
            ~/.hostwright-phase02-vendor-tap/*.json
            ~/.hostwright-phase02-vendor-tap/*.plist
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 90
