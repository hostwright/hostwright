name: Documentation and website

on:
  pull_request:
    paths:
      - "README.md"
      - "docs/**"
      - "examples/**"
      - "schemas/**"
      - "contracts/**"
      - "scripts/check-*.py"
      - "scripts/check-docs.sh"
      - ".github/workflows/docs-site.yml"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  core-documentation:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Validate current docs, links, and quickstarts
        run: scripts/check-docs.sh
