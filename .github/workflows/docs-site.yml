name: Documentation and website

on:
  pull_request:
    paths:
      - "README.md"
      - "docs/**"
      - "examples/**"
      - "schemas/**"
      - "contracts/**"
      - "scripts/check-*.py"
      - "scripts/check-docs.sh"
      - ".github/workflows/docs-site.yml"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  core-documentation:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Validate current docs, links, and quickstarts
        run: scripts/check-docs.sh

  website:
    runs-on: macos-26
    steps:
      - name: Check out Hostwright core
        uses: actions/checkout@v4
        with:
          path: core
      - name: Check out hostwright.dev
        uses: actions/checkout@v4
        with:
          repository: hostwright/hostwright.dev
          path: site
      - name: Install website dependencies
        working-directory: site
        run: |
          npm ci
          npm --prefix docs ci
      - name: Check v0.0.2 website contract
        run: python3 core/scripts/check-site-contract.py site
      - name: Audit landing-site dependencies
        working-directory: site
        run: npm audit --audit-level=high
      - name: Audit documentation-site dependencies
        working-directory: site
        run: npm --prefix docs audit --audit-level=high
      - name: Typecheck landing site
        working-directory: site
        run: npm run check
      - name: Typecheck documentation site
        working-directory: site
        run: npm --prefix docs run check
      - name: Build landing site
        working-directory: site
        run: npm run build
      - name: Build documentation site
        working-directory: site
        run: npm --prefix docs run build
      - name: Check landing-site internal links
        run: python3 core/scripts/check-built-site-links.py site/dist
      - name: Check documentation-site internal links
        run: python3 core/scripts/check-built-site-links.py site/docs/dist
