name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build
      - name: Test
        run: swift test
      - name: Lint
        run: scripts/lint.sh
      - name: Naming scan
        run: scripts/grep-orchard.sh .
